name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  subgraph:
    name: Subgraph
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/subgraph
    strategy:
      matrix:
        network: [calibration, mainnet]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Goldsky CLI
        run: curl -fsSL https://goldsky.com | sh -s -- -f
        shell: bash

      - name: Build Subgraph
        run: |
          NETWORK=${{ matrix.network }} pnpm run build

      - name: Deploy to Goldsky
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          goldsky subgraph deploy "filecoin-pay-${{ matrix.network }}/$VERSION" --path . --token ${{ secrets.GOLDSKY_API_KEY }}
